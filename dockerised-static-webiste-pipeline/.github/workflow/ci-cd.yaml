name: Dockerised Static Website CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found!"
            exit 1  
          fi
      
      - name: Validate CSS
        run: |
          if [ ! -f styles.css ]; then
            echo "styles.css not found!"
            exit 1
          fi
  
  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build docker Image
        run: |
          docker build -t static-web-image .
      
      - name: Verify Images
        run: |
          docker images | grep static-web-image

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          #publish_branch: gh-pages
    